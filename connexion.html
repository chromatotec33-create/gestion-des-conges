<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" />
    <title>Connexion - Gestion des congés</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar" data-app-header></header>
    <main class="container narrow">
      <section class="panel">
        <h1>Connexion</h1>
        <p class="hint">Comptes de démonstration: admin@entreprise.fr / Admin123!</p>
        <form id="login-form" novalidate>
          <div class="field-row">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>
          <div class="field-row">
            <label for="password">Mot de passe</label>
            <input id="password" name="password" type="password" required />
          </div>
          <div class="actions">
            <button type="submit">Se connecter</button>
            <span id="login-status" role="status" aria-live="polite"></span>
          </div>
        </form>
      </section>
    </main>
    <script type="module" src="./connexion-page.js"></script>
  </body>
</html>
