<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" />
    <title>Connexion sécurisée</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="auth-wrap">
      <section class="panel auth-panel">
        <h1>Connexion sécurisée</h1>
        <p class="muted">Accédez à votre portail RH organisation.</p>
        <p class="hint">Demo: admin@entreprise.fr / Admin123!</p>
        <form id="login-form" novalidate>
          <div class="field-row"><label for="email">Email</label><input id="email" name="email" type="email" required /></div>
          <div class="field-row"><label for="password">Mot de passe</label><input id="password" name="password" type="password" required /></div>
          <div class="actions"><button type="submit">Se connecter</button><span id="login-status" role="status" aria-live="polite"></span></div>
        </form>
        <p><a href="./index.html">← Retour à l'accueil</a></p>
      </section>
    </main>
    <script type="module" src="./connexion-page.js"></script>
  </body>
</html>
