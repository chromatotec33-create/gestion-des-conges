<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" />
    <title>Suivi des demandes - Gestion des congés</title>
    <link rel="stylesheet" href="./styles.css" />

    <main class="container">
      <section class="panel">
        <h1>Suivi des demandes</h1>

            <thead>
              <tr>
                <th>Type</th>
                <th>Période</th>

                <th>Motif</th>
                <th>Statut</th>

            </thead>
            <tbody id="requests-body"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script type="module" src="./suivi-page.js"></script>
